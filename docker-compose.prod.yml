# Produccion: levantar con:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Ajusta APP_URL en .env.docker antes de construir
# (ej. http://192.168.1.100:8080 para red local, o https://tudominio.com)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practica-login-app-prod
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:8000"
      - "8443:8443"
    environment:
      APP_NAME: Laravel
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      AUTH_LOG_LEVEL: info
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_COOKIE: auth_sid
      MAIL_MAILER: smtp
      WEBAUTHN_ORIGINS: https://192.168.1.81:8443,http://localhost:8080
      RECAPTCHA_SITE_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      RECAPTCHA_SECRET: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  mariadb:
    image: mariadb:11.4
    container_name: practica-login-db-prod
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_USER: laravel
      MARIADB_PASSWORD: laravel
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: practica-login-mailpit-prod
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mariadb_data:
