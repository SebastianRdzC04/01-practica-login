services:
  app-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practica-login-test-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_NAME: Laravel
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mariadb-test
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      SESSION_LIFETIME: 120
      MAIL_MAILER: array
      LOG_CHANNEL: null
      LOG_LEVEL: debug
      AUTH_LOG_LEVEL: info
      VIEW_COMPILED_PATH: /tmp/opencode/laravel-test-views
    depends_on:
      mariadb-test:
        condition: service_healthy
    command: ["test-runner"]

  mariadb-test:
    image: mariadb:11.4
    container_name: practica-login-test-db
    environment:
      MARIADB_DATABASE: laravel_test
      MARIADB_USER: laravel
      MARIADB_PASSWORD: laravel
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20


