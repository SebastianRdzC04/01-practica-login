services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practica-loginregister-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:8000"
      - "8443:8443"
      - "5173:5173"
    environment:
      APP_NAME: Laravel
      APP_ENV: docker
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: laravel_logs
      MONGO_AUTH_LOG_COLLECTION: auth_logs
      AUTH_LOG_LEVEL: info
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      MAIL_MAILER: smtp
      VITE_APP_NAME: Laravel
      RECAPTCHA_SITE_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      RECAPTCHA_SECRET: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

    depends_on:
      mariadb:
        condition: service_healthy
      mongo:
        condition: service_started
      mailpit:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  mariadb:
    image: mariadb:11.4
    container_name: practica-login-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_USER: laravel
      MARIADB_PASSWORD: laravel
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7.0
    container_name: practica-login-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    container_name: practica-login-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mariadb_data:
  mongo_data:
