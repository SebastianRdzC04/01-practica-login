limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

split_clients $request_id $backend {
    50% app1;
    *   app2;
}

map $backend $backend_addr {
    app1 10.124.0.3:52043;
    app2 10.124.0.2:53378;
}

map $backend $backend_name {
    app1 10.124.0.3;
    app2 10.124.0.2;
}

server {
    listen 80;
    listen [::]:80;
    server_name devas-projects.sbs www.devas-projects.sbs;

    server_tokens off;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name devas-projects.sbs www.devas-projects.sbs;

    server_tokens off;

    ssl_certificate /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:P-256:P-384:X25519;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;
    limit_conn conn_per_ip 20;
    limit_conn_status 429;

    error_page 502 /502.json;
    error_page 503 /503.json;
    error_page 504 /504.json;

    location = /502.json {
        default_type application/json;
        return 502 '{"error":"Backend no disponible"}';
    }
    location = /503.json {
        default_type application/json;
        return 503 '{"error":"En mantenimiento"}';
    }
    location = /504.json {
        default_type application/json;
        return 504 '{"error":"Timeout del backend"}';
    }

    location / {
        proxy_pass https://$backend_addr;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/nginx/ssl/ca-chain.pem;
        proxy_ssl_server_name on;
        proxy_ssl_name $backend_name;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_session_reuse on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }
}
